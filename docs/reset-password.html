<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corpo VPN | Reset Password</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            dark: '#060818',
                            cyan: '#06b6d4',
                            purple: '#8b5cf6',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #060818; color: white; }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                radial-gradient(at 40% 20%, hsla(192,100%,40%,0.15) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(258,100%,66%,0.15) 0px, transparent 50%);
            z-index: -1;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center p-6 relative">
    
    <div class="mesh-bg"></div>

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-3 mb-8">
            <img src="logo.png" alt="Corpo VPN Logo" class="w-10 h-10 rounded-xl shadow-lg shadow-cyan-500/20 object-cover" />
            <h1 class="font-bold text-2xl tracking-tight text-white">Corpo <span class="font-light">VPN</span></h1>
        </div>

        <div class="glass-card p-8 rounded-2xl shadow-2xl relative overflow-hidden">
            <!-- decorative blur -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-cyan-500/20 filter blur-[40px] rounded-full pointer-events-none"></div>

            <h2 class="text-xl font-bold text-white mb-2">Reset Password</h2>
            <p class="text-sm text-slate-400 mb-6">Enter a strong new password for your enterprise VPN account.</p>

            <form id="reset-form" class="space-y-4">
                <div>
                    <label class="block text-xs text-slate-400 font-medium mb-1.5">New Password</label>
                    <div class="relative">
                        <i class="ph-bold ph-lock-key absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="password" id="password" required placeholder="Min 8 chars, 1 uppercase, 1 symbol"
                            class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 pl-10 pr-4 text-sm text-white focus:outline-none focus:border-cyan-500/50 transition-colors">
                    </div>
                </div>
                
                <!-- Error & Success Messages -->
                <div id="error-box" class="hidden text-xs text-red-400 bg-red-500/10 border border-red-500/20 p-3 rounded-xl"></div>
                <div id="success-box" class="hidden text-xs text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 p-3 rounded-xl flex items-center gap-2">
                    <i class="ph-bold ph-check-circle text-lg"></i>
                    Password updated successfully! You may now close this window and log in to the Corpo VPN app.
                </div>

                <button type="submit" id="submit-btn" class="w-full py-3 rounded-xl bg-cyan-500 text-brand-dark font-bold text-sm hover:bg-cyan-400 transition-colors flex items-center justify-center gap-2 mt-2">
                    Update Password
                </button>
            </form>
        </div>
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://daqlbsnqymylblcibqxl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhcWxic25xeW15bGJsY2licXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTE4NDMsImV4cCI6MjA5MzI4Nzg0M30.bDP90o3ijn3dJX1siukINyRFEEUxMB8Xx7qge2OZHoc';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('reset-form');
        const passInput = document.getElementById('password');
        const btn = document.getElementById('submit-btn');
        const errorBox = document.getElementById('error-box');
        const successBox = document.getElementById('success-box');

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.remove('hidden');
            successBox.classList.add('hidden');
        }

        // On page load, Supabase automatically reads the hash (access_token)
        // and establishes a session. We can just call updateUser!
        
        // Handle Implicit flow (#access_token=) just in case
        if (window.location.hash.includes('access_token')) {
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const access_token = hashParams.get('access_token');
            const refresh_token = hashParams.get('refresh_token');
            if (access_token && refresh_token) {
                supabase.auth.setSession({ access_token, refresh_token });
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.classList.add('hidden');
            
            const password = passInput.value;
            
            // Validate password strength (Match Main App: Upper, Lower, Special, 8 chars)
            if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*])(?=.{8,})/.test(password)) {
                showError("Password must be 8+ characters, and include uppercase, lowercase, and a symbol (!@#$%^&*)");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin"></i> Updating...';

            try {
                // Let's forcefully wait for session if it's still loading
                let { data: { session } } = await supabase.auth.getSession();
                
                // If no session, try extracting the PKCE code manually as a fallback
                if (!session) {
                    const queryParams = new URLSearchParams(window.location.search);
                    const code = queryParams.get('code');
                    if (code) {
                        const { data, error } = await supabase.auth.exchangeCodeForSession(code);
                        if (!error && data.session) session = data.session;
                    }
                }

                if (!session) {
                    throw new Error("Invalid or expired session. Please request a new password reset link from the app.");
                }

                const { error } = await supabase.auth.updateUser({ password });
                
                if (error) throw error;
                
                // Completely transform the UI to a Thank You screen
                document.querySelector('h2').textContent = 'Thank You!';
                document.querySelector('p').textContent = 'Your password has been successfully updated.';
                form.style.display = 'none'; // Hide the form
                successBox.classList.remove('hidden');
                successBox.innerHTML = '<i class="ph-bold ph-check-circle text-4xl mb-2"></i><br/>Password changed. You may now close this window and log in to the Desktop App!';
                successBox.className = 'text-center text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 p-6 rounded-xl flex flex-col items-center';
                
            } catch (err) {
                showError(err.message || 'Failed to update password.');
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        });
    </script>
</body>
</html>
