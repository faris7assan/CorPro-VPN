<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corpo VPN | Email Verified</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            dark: '#060818',
                            cyan: '#06b6d4',
                            purple: '#8b5cf6',

                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #060818; color: white; }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                radial-gradient(at 40% 20%, hsla(192,100%,40%,0.15) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(258,100%,66%,0.15) 0px, transparent 50%);
            z-index: -1;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center p-6 relative">
    
    <div class="mesh-bg"></div>

    <div class="w-full max-w-md text-center">
        <!-- Logo -->

            <h1 class="font-bold text-2xl tracking-tight text-white">Corpo <span class="font-light">VPN</span></h1>
        </div>

        <div class="glass-card p-10 rounded-2xl shadow-2xl relative overflow-hidden">
            <!-- decorative blur -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-emerald-500/20 filter blur-[40px] rounded-full pointer-events-none"></div>

            <div class="w-20 h-20 bg-emerald-500/10 border border-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="ph-bold ph-check text-4xl text-emerald-400"></i>
            </div>

            <h2 class="text-2xl font-bold text-white mb-2">Email Verified!</h2>
            <p class="text-slate-400 mb-6">
                Your email has been successfully verified. You now have access to the Corpo VPN network.
            </p>

            <div class="text-sm font-medium text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 py-3 px-4 rounded-xl">
                You may now close this browser window and return to the Corpo VPN Desktop App to log in.
            </div>
        </div>
    </div>

    <script>
        // Exchange code for session if PKCE is used, so the user is marked verified in the background
        const SUPABASE_URL = 'https://daqlbsnqymylblcibqxl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhcWxic25xeW15bGJsY2licXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTE4NDMsImV4cCI6MjA5MzI4Nzg0M30.bDP90o3ijn3dJX1siukINyRFEEUxMB8Xx7qge2OZHoc';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const queryParams = new URLSearchParams(window.location.search);
        const code = queryParams.get('code');
        if (code) {
            supabase.auth.exchangeCodeForSession(code);
        }
    </script>
</body>
</html>
